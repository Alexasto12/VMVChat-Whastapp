services:
  app:
    build: .
    environment:
      CM_API_KEY: ${CM_API_KEY}
      CM_SENDER: ${CM_SENDER}
      AUTH_USER: ${AUTH_USER}
      AUTH_PASSWORD: ${AUTH_PASSWORD}
      WEBHOOK_TOKEN: ${WEBHOOK_TOKEN}
    volumes:
      - vmvchat-data:/data   # chat.db + backups persisten aquí entre reinicios
    ports:
      - "8090:8080"          # acceso directo local; en producción usa el perfil tls
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  vmvchat-data: